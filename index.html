<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OBD Racing Master</title>
    <style>
        :root { --bg: #000; --accent: #ccff00; --text: #fff; --gray: #333; }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', Courier, monospace; margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        
        #header { padding: 10px; border-bottom: 1px solid var(--gray); display: flex; justify-content: space-between; font-size: 12px; }
        #status-obd { color: #ff3300; }
        #status-obd.connected { color: var(--accent); }

        #main-display { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        #prev-measure { font-size: 20px; color: #888; margin-bottom: 20px; }
        #current-value { font-size: 120px; font-weight: bold; color: var(--accent); text-shadow: 0 0 20px rgba(204, 255, 0, 0.4); }
        #label { font-size: 24px; color: #fff; margin-top: 10px; }

        #controls { padding: 20px; display: flex; gap: 10px; }
        button { flex: 1; padding: 15px; background: var(--gray); color: #fff; border: none; border-radius: 5px; font-weight: bold; }
        #btn-connect { background: #1a1a1a; border: 1px solid var(--accent); color: var(--accent); }
        
        .running { border: 4px solid var(--accent); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div id="header">
    <div id="status-obd">OBD: DISCONNESSO</div>
    <div id="speed-display">0 km/h</div>
</div>

<div id="main-display">
    <div id="prev-measure">ULTIMA: --</div>
    <div id="current-value">READY</div>
    <div id="label">PREMI IL TASTO</div>
</div>

<div id="controls">
    <button id="btn-connect" onclick="connectOBD()">1. CONNETTI OBD</button>
</div>

<script>
    let device, server, characteristic;
    let state = 0; // 0: Idle, 1: Running, 2: Result
    let totalMeters = 0;
    let lastTime = 0;
    let currentSpeed = 0;
    let prevValue = "--";

    // --- CONFIGURAZIONE UTENTE ---
    // Qui l'utente può mappare i metri reali con quello che vuole vedere
    const mapping = [
        { real: 10, display: "20" },
        { real: 20, display: "ZONA TEST" },
        { real: 50, display: "TRAGUARDO" }
    ];

    async function connectOBD() {
        try {
            device = await navigator.bluetooth.requestDevice({
                filters: [{ namePrefix: 'V-LINK' }, { namePrefix: 'OBD' }, { services: ['0000fff0-0000-1000-8000-00805f9b34fb'] }],
                optionalServices: ['0000fff0-0000-1000-8000-00805f9b34fb']
            });
            server = await device.gatt.connect();
            const service = await server.getPrimaryService('0000fff0-0000-1000-8000-00805f9b34fb');
            characteristic = await service.getCharacteristic('0000fff1-0000-1000-8000-00805f9b34fb');
            
            document.getElementById('status-obd').innerText = "OBD: CONNESSO";
            document.getElementById('status-obd').className = "connected";
            startPolling();
        } catch (e) { console.log(e); alert("Errore connessione: " + e); }
    }

    function startPolling() {
        setInterval(async () => {
            if (characteristic) {
                // Invia comando PID 0D (Velocità)
                await characteristic.writeValue(new TextEncoder().encode("010D\r"));
                // Qui andrebbe la logica di lettura risposta (omessa per brevità, va rifinita col dispositivo)
            }
        }, 200); // 5 volte al secondo
    }

    // --- LOGICA 3 CLICK (Tastino Bluetooth) ---
    // Il tastino solitamente simula un tasto tastiera (es. Volume o Invio)
    window.addEventListener('keydown', (e) => {
        handleAction();
    });

    function handleAction() {
        if (state === 0) { // START
            state = 1;
            totalMeters = 0;
            lastTime = Date.now();
            document.getElementById('current-value').innerText = "0";
            document.getElementById('label').innerText = "MISURAZIONE IN CORSO...";
            document.body.classList.add('running');
        } 
        else if (state === 1) { // STOP
            state = 2;
            document.body.classList.remove('running');
            let finalValue = getMappedValue(totalMeters);
            prevValue = finalValue;
            document.getElementById('current-value').innerText = finalValue;
            document.getElementById('label').innerText = "RISULTATO";
            speak(finalValue);
        } 
        else if (state === 2) { // RESET & RESTART
            document.getElementById('prev-measure').innerText = "ULTIMA: " + prevValue;
            state = 0;
            handleAction(); // Fà ripartire subito la misura
        }
    }

    function getMappedValue(realM) {
        // Cerca nella tabella se c'è una parola o un numero custom
        let match = mapping.find(m => realM >= m.real - 5 && realM <= m.real + 5);
        return match ? match.display : Math.round(realM) + " m";
    }

    function speak(text) {
        let utterance = new SpeechSynthesisUtterance(text);
        window.speechSynthesis.speak(utterance);
    }
</script>
</body>
</html>
