<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ICAR PRO QUICK CONNECT</title>
    <style>
        :root { --bg: #000; --accent: #d4ff00; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; text-align: center; overflow: hidden; }
        #conn-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        #conn-btn { padding: 30px 60px; font-size: 24px; background: var(--accent); border: none; border-radius: 50px; cursor: pointer; color: black; font-weight: bold; }
        .box { flex: 1; display: flex; flex-direction: column; justify-content: center; border-bottom: 2px solid #111; }
        #speed-val { font-size: 160px; font-weight: 900; line-height: 1; }
        #trip-val { font-size: 110px; color: var(--accent); font-weight: bold; }
        #debug { font-size: 12px; color: #444; height: 50px; padding: 10px; font-family: monospace; }
    </style>
</head>
<body>

<div id="conn-layer">
    <button id="conn-btn" id="main-btn">CONNETTI OBD</button>
    <p id="status-msg" style="color:#666; margin-top:20px;">Clicca per aprire la tendina Bluetooth</p>
</div>

<div class="box">
    <div style="font-size:18px; color:#555">VELOCITÀ KM/H</div>
    <div id="speed-val">0</div>
</div>

<div id="trip-box" class="box">
    <div id="trip-val">0</div>
    <div id="trip-status" style="font-size:18px; color:#555">PRONTO</div>
</div>

<div id="debug">Log: In attesa...</div>

<script>
    let gattChar;
    let state = 0; 
    let totalMeters = 0;
    let currentSpeed = 0;
    let lastTime = 0;

    // Funzione di log rapida
    function updateLog(text) {
        document.getElementById('debug').innerText = text;
    }

    // IL TASTO DEVE ATTIVARE QUESTO
    document.getElementById('conn-btn').addEventListener('click', async () => {
        updateLog("Apertura tendina...");
        try {
            const device = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: [
                    '000018f0-0000-1000-8000-00805f9b34fb',
                    '0000fff0-0000-1000-8000-00805f9b34fb'
                ]
            });

            updateLog("Connessione a " + device.name + "...");
            const server = await device.gatt.connect();
            
            updateLog("Ricerca canali...");
            const services = await server.getPrimaryServices();
            
            for (const s of services) {
                const chars = await s.getCharacteristics();
                for (const c of chars) {
                    if (c.properties.write || c.properties.writeWithoutResponse) {
                        gattChar = c;
                        break;
                    }
                }
                if (gattChar) break;
            }

            if (!gattChar) throw new Error("Canale non trovato");

            await gattChar.startNotifications();
            gattChar.addEventListener('characteristicvaluechanged', (e) => {
                let raw = new TextDecoder().decode(e.target.value).replace(/\s+/g, '');
                updateLog("Dati: " + raw);
                if (raw.includes("410D")) {
                    let hex = raw.substr(raw.indexOf("410D") + 4, 2);
                    currentSpeed = parseInt(hex, 16);
                    document.getElementById('speed-val').innerText = currentSpeed;
                    if (state === 1) {
                        let now = Date.now();
                        if (lastTime > 0) totalMeters += (currentSpeed / 3.6) * ((now - lastTime) / 1000);
                        document.getElementById('trip-val').innerText = Math.round(totalMeters);
                        lastTime = now;
                    }
                }
            });

            // Inizializzazione
            const cmds = ["ATZ\r", "ATSP0\r", "010D\r"];
            for (let cmd of cmds) {
                await gattChar.writeValue(new TextEncoder().encode(cmd));
                await new Promise(r => setTimeout(r, 400));
            }

            document.getElementById('conn-layer').style.display = "none";
            
            setInterval(() => {
                if (gattChar) gattChar.writeValue(new TextEncoder().encode("010D\r")).catch(()=>{});
            }, 200);

        } catch (err) {
            updateLog("ERRORE: " + err.message);
            alert("Errore Bluetooth: " + err.message);
        }
    });

    // Gestione tasto esterno (tastiera/pulsante BT)
    window.onkeydown = () => {
        if (state === 0) {
            state = 1; totalMeters = 0; lastTime = Date.now();
            document.getElementById('trip-status').innerText = "MISURANDO...";
        } else if (state === 1) {
            state = 2;
            document.getElementById('trip-status').innerText = "STOP";
            speechSynthesis.speak(new SpeechSynthesisUtterance(Math.round(totalMeters) + " metri"));
        } else {
            state = 0; window.onkeydown();
        }
    };
</script>
</body>
</html>
