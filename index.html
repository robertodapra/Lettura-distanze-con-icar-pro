<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OBD MASTER PRO</title>
    <style>
        :root { --bg: #050505; --accent: #d4ff00; --red: #ff3e3e; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #status-bar { display: flex; justify-content: space-between; padding: 15px; font-size: 12px; border-bottom: 1px solid #222; }
        .connected { color: var(--accent); }
        .disconnected { color: var(--red); }
        #display { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #main-val { font-size: 80px; font-weight: 900; color: var(--accent); text-align: center; }
        #info-label { font-size: 18px; color: #666; margin-top: 10px; }
        #ui-layer { padding: 30px; }
        button { width: 100%; padding: 20px; background: transparent; border: 2px solid var(--accent); color: var(--accent); border-radius: 12px; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>

<div id="status-bar">
    <div id="obd-status" class="disconnected">OBD: DISCONNESSO</div>
</div>

<div id="display">
    <div id="main-val">READY</div>
    <div id="info-label">CLICCA SOTTO PER CONNETTERE</div>
</div>

<div id="ui-layer">
    <button id="conn-btn" onclick="initOBD()">CONNETTI SISTEMA</button>
</div>

<script>
    let gattChar;
    let state = 0; 
    let totalMeters = 0;
    let lastValue = "";

    async function initOBD() {
        try {
            const device = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: [
                    '0000fff0-0000-1000-8000-00805f9b34fb',
                    '000018f0-0000-1000-8000-00805f9b34fb',
                    '0000ae08-0000-1000-8000-00805f9b34fb'
                ]
            });

            const server = await device.gatt.connect();
            const services = await server.getPrimaryServices();
            
            for (let service of services) {
                const chars = await service.getCharacteristics();
                if (chars.length > 0) {
                    gattChar = chars[0];
                    break;
                }
            }

            document.getElementById('obd-status').innerText = "OBD: CONNESSO";
            document.getElementById('obd-status').className = "connected";
            document.getElementById('conn-btn').style.display = "none";
            document.getElementById('main-val').innerText = "0";
            document.getElementById('info-label').innerText = "USA IL TASTO FISICO";
            
        } catch (err) {
            alert("Errore Bluetooth: " + err.message);
        }
    }

    // Ascolta il tastino Bluetooth (simula la tastiera)
    window.addEventListener('keydown', (e) => {
        handleInput();
    });

    function handleInput() {
        if (state === 0) { // START
            state = 1;
            totalMeters = 0;
            document.getElementById('main-val').innerText = "VAI!";
        } 
        else if (state === 1) { // STOP
            state = 2;
            let result = "40 m"; // Esempio fisso per ora
            document.getElementById('main-val').innerText = result;
            let msg = new SpeechSynthesisUtterance(result);
            window.speechSynthesis.speak(msg);
        } 
        else if (state === 2) { // RESET
            state = 0;
            document.getElementById('main-val').innerText = "0";
        }
    }
</script>
</body>
</html>
