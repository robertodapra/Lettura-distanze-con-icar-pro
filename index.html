<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iCAR PRO RACING</title>
    <style>
        :root { --bg: #000; --accent: #d4ff00; }
        body { background: var(--bg); color: white; font-family: 'Arial Black', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; text-align: center; overflow: hidden; }
        #conn-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        #conn-btn { padding: 30px 60px; font-size: 24px; background: var(--accent); border: none; border-radius: 50px; cursor: pointer; color: black; box-shadow: 0 0 20px rgba(212,255,0,0.4); }
        .box { flex: 1; display: flex; flex-direction: column; justify-content: center; border-bottom: 2px solid #111; }
        #speed-val { font-size: 160px; font-weight: 900; line-height: 1; }
        #trip-val { font-size: 110px; color: var(--accent); }
        .label { font-size: 18px; color: #444; text-transform: uppercase; }
        .active { background: #0a0a0a; border-left: 15px solid var(--accent); }
    </style>
</head>
<body>

<div id="conn-layer">
    <button id="conn-btn" onclick="connect()">CONNETTI iCAR PRO</button>
    <p id="msg" style="color:#444; margin-top:15px;">Assicurati che il LED blu lampeggi</p>
</div>

<div class="box">
    <div class="label">Velocità KM/H</div>
    <div id="speed-val">0</div>
</div>

<div id="trip-box" class="box">
    <div id="trip-val">0</div>
    <div id="status" class="label">IDLE</div>
</div>

<script>
    let gattChar;
    let state = 0; 
    let totalMeters = 0;
    let currentSpeed = 0;
    let lastTime = 0;

    // UUID Specifici per Vgate iCar Pro BLE
    const SERVICE_UUID = '000018f0-0000-1000-8000-00805f9b34fb';
    const CHAR_UUID = '00002af0-0000-1000-8000-00805f9b34fb';

    async function connect() {
        const msg = document.getElementById('msg');
        try {
            msg.innerText = "Ricerca iCar Pro...";
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ namePrefix: 'V-LINK' }, { namePrefix: 'Vgate' }, { namePrefix: 'android' }],
                optionalServices: [SERVICE_UUID]
            });

            msg.innerText = "Apertura canale...";
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService(SERVICE_UUID);
            gattChar = await service.getCharacteristic(CHAR_UUID);

            await gattChar.startNotifications();
            gattChar.addEventListener('characteristicvaluechanged', handleData);
            
            // Setup rapido iCar Pro
            await gattChar.writeValue(new TextEncoder().encode("ATZ\r"));
            setTimeout(() => gattChar.writeValue(new TextEncoder().encode("ATL0\r")), 300);
            setTimeout(() => gattChar.writeValue(new TextEncoder().encode("ATH0\r")), 600);
            
            document.getElementById('conn-layer').style.display = "none";

            // Richiesta velocità ogni 150ms per massima reattività
            setInterval(() => {
                if (gattChar) gattChar.writeValue(new TextEncoder().encode("010D\r")).catch(()=>{});
            }, 150);

        } catch (e) {
            msg.innerText = "ERRORE: " + e.message;
            console.error(e);
        }
    }

    function handleData(event) {
        let str = new TextDecoder().decode(event.target.value).replace(/\s+/g, '');
        if (str.includes("410D")) {
            let pos = str.indexOf("410D");
            let hex = str.substr(pos + 4, 2);
            currentSpeed = parseInt(hex, 16);
            document.getElementById('speed-val').innerText = currentSpeed;

            if (state === 1) {
                let ora = Date.now();
                if (lastTime > 0) {
                    let dt = (ora - lastTime) / 1000;
                    totalMeters += (currentSpeed / 3.6) * dt;
                    document.getElementById('trip-val').innerText = Math.round(totalMeters);
                }
                lastTime = ora;
            }
        }
    }

    window.onkeydown = () => {
        if (state === 0) { // START
            state = 1; totalMeters = 0; lastTime = Date.now();
            document.getElementById('status').innerText = "MISURANDO...";
            document.getElementById('trip-box').classList.add('active');
        } else if (state === 1) { // STOP
            state = 2;
            document.getElementById('status').innerText = "RISULTATO";
            document.getElementById('trip-box').classList.remove('active');
            let m = Math.round(totalMeters);
            speechSynthesis.speak(new SpeechSynthesisUtterance(m + " metri"));
        } else { // RESET & RESTART
            state = 0; window.onkeydown();
        }
    };
</script>
</body>
</html>
