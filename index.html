<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OBD FIX - V-LINK</title>
    <style>
        :root { --bg: #000; --accent: #d4ff00; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; text-align: center; }
        #conn-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        #conn-btn { padding: 25px 50px; font-size: 20px; background: var(--accent); border: none; border-radius: 50px; font-weight: bold; }
        .box { flex: 1; display: flex; flex-direction: column; justify-content: center; border-bottom: 1px solid #222; }
        #speed-val { font-size: 140px; font-weight: bold; line-height: 1; }
        #trip-val { font-size: 90px; color: var(--accent); }
    </style>
</head>
<body>

<div id="conn-layer">
    <h2 style="color:var(--accent)">STEP 1: CONNESSIONE</h2>
    <p>Assicurati che il Bluetooth sia attivo</p>
    <button id="conn-btn" onclick="startConnection()">TROVA V-LINK</button>
</div>

<div class="box">
    <div id="speed-val">0</div>
    <div style="color:#444">KM/H REALI</div>
</div>

<div id="trip-box" class="box">
    <div id="trip-val">0</div>
    <div id="status" style="color:#555">ATTESA TASTO</div>
</div>

<script>
    let characteristic;
    let state = 0; 
    let totalMeters = 0;
    let currentSpeed = 0;
    let lastTime = 0;

    // Lista UUID comuni per V-LINK e cloni ELM327 BLE
    const targetUUIDs = [
        '0000fff0-0000-1000-8000-00805f9b34fb', // Quello precedente
        '0000ffe0-0000-1000-8000-00805f9b34fb', // Comune nei cloni
        '000018f0-0000-1000-8000-00805f9b34fb', // Standard OBD BLE
        'ae08' // Proprietario alcuni V-Link
    ];

    async function startConnection() {
        try {
            const device = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: targetUUIDs
            });

            const server = await device.gatt.connect();
            
            // Cerchiamo quale degli UUID è quello giusto
            let service;
            for (let uuid of targetUUIDs) {
                try {
                    service = await server.getPrimaryService(uuid);
                    if (service) break;
                } catch (e) { continue; }
            }

            if (!service) throw new Error("Servizio non trovato. Prova a riaccendere l'OBD.");

            const chars = await service.getCharacteristics();
            characteristic = chars[0];

            await characteristic.startNotifications();
            document.getElementById('conn-layer').style.display = "none";

            characteristic.addEventListener('characteristicvaluechanged', (event) => {
                let raw = new TextDecoder().decode(event.target.value).replace(/\s+/g, '');
                if (raw.includes("410D")) {
                    let index = raw.indexOf("410D");
                    let hexValue = raw.substr(index + 4, 2); 
                    currentSpeed = parseInt(hexValue, 16);
                    document.getElementById('speed-val').innerText = currentSpeed;

                    if (state === 1) {
                        let now = Date.now();
                        if (lastTime > 0) {
                            let dt = (now - lastTime) / 1000;
                            totalMeters += (currentSpeed / 3.6) * dt;
                            document.getElementById('trip-val').innerText = Math.round(totalMeters);
                        }
                        lastTime = now;
                    }
                }
            });

            // Loop richiesta velocità
            setInterval(() => {
                if(characteristic) characteristic.writeValue(new TextEncoder().encode("010D\r"));
            }, 250);

        } catch (e) {
            alert("Errore: " + e.message + "\n\nSuggerimento: Stacca e riattacca l'OBD dalla macchina.");
        }
    }

    // Logica Tasto
    window.onkeydown = () => {
        if (state === 0) { 
            state = 1; totalMeters = 0; lastTime = Date.now();
            document.getElementById('status').innerText = "CALCOLO...";
            document.getElementById('trip-box').style.background = "#111";
        } else if (state === 1) {
            state = 2;
            document.getElementById('status').innerText = "FINE";
            document.getElementById('trip-box').style.background = "#000";
            speechSynthesis.speak(new SpeechSynthesisUtterance(Math.round(totalMeters) + " metri"));
        } else {
            state = 0; window.onkeydown();
        }
    };
</script>
</body>
</html>
