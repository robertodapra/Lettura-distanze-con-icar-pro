<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ICAR PRO - RALLY TRIP</title>
    <style>
        :root { --bg: #000; --accent: #d4ff00; }
        body { background: var(--bg); color: white; font-family: 'Arial', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; text-align: center; overflow: hidden; }
        #conn-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        #conn-btn { padding: 30px 60px; font-size: 24px; background: var(--accent); border: none; border-radius: 50px; cursor: pointer; color: black; font-weight: bold; }
        .box { flex: 1; display: flex; flex-direction: column; justify-content: center; border-bottom: 2px solid #111; }
        #speed-val { font-size: 160px; font-weight: 900; line-height: 1; color: white; }
        #trip-val { font-size: 110px; color: var(--accent); font-weight: bold; }
        #debug-log { font-size: 12px; color: #444; background: #050505; height: 60px; overflow-y: auto; padding: 10px; text-align: left; font-family: monospace; }
        .label { font-size: 18px; color: #555; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="conn-layer">
    <button id="conn-btn" onclick="connect()">CONNETTI OBD</button>
    <p id="status-msg" style="color:#666; margin-top:20px;">Assicurati che l'auto sia accesa</p>
</div>

<div class="box">
    <div class="label">Velocità KM/H</div>
    <div id="speed-val">0</div>
</div>

<div id="trip-box" class="box">
    <div id="trip-val">0</div>
    <div id="trip-status" class="label">PRONTO</div>
</div>

<div id="debug-log">Log: In attesa di connessione...</div>

<script>
    let gattChar;
    let state = 0; 
    let totalMeters = 0;
    let currentSpeed = 0;
    let lastTime = 0;
    const enc = new TextEncoder();
    const dec = new TextDecoder();

    function log(msg) {
        const el = document.getElementById('debug-log');
        el.innerText = msg + "\n" + el.innerText;
    }

    async function connect() {
        try {
            log("Avvio scansione...");
            // Accettiamo TUTTI i dispositivi per non avere errori di UUID
            const device = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: [
                    '000018f0-0000-1000-8000-00805f9b34fb', // iCar Pro Service
                    '0000fff0-0000-1000-8000-00805f9b34fb'  // Generic OBD Service
                ]
            });

            log("Connessione a " + device.name);
            const server = await device.gatt.connect();
            
            log("Ricerca Servizi...");
            const services = await server.getPrimaryServices();
            
            // Cerchiamo una caratteristica che supporti la scrittura
            for (const s of services) {
                const chars = await s.getCharacteristics();
                for (const c of chars) {
                    if (c.properties.write || c.properties.writeWithoutResponse) {
                        gattChar = c;
                        break;
                    }
                }
                if (gattChar) break;
            }

            if (!gattChar) throw new Error("Nessun canale dati trovato.");

            await gattChar.startNotifications();
            gattChar.addEventListener('characteristicvaluechanged', handleData);
            
            // SVEGLIA L'OBD E L'AUTO
            log("Inizializzazione protocollo...");
            const initCmds = ["ATZ\r", "ATSP0\r", "ATE0\r", "010D\r"];
            for (let cmd of initCmds) {
                await gattChar.writeValue(enc.encode(cmd));
                await new Promise(r => setTimeout(r, 500)); 
            }
            
            document.getElementById('conn-layer').style.display = "none";
            log("Sistema Pronto.");

            // Loop interrogazione velocità (200ms)
            setInterval(() => {
                if (gattChar) gattChar.writeValue(enc.encode("010D\r")).catch(()=>{});
            }, 200);

        } catch (e) {
            log("ERRORE: " + e.message);
            alert("Errore: " + e.message);
        }
    }

    function handleData(event) {
        let raw = dec.decode(event.target.value).replace(/\s+/g, '');
        // Se nel log vedi "410DXX", XX è la velocità
        if (raw.includes("410D")) {
            let pos = raw.indexOf("410D");
            let hex = raw.substr(pos + 4, 2);
            let val = parseInt(hex, 16);
            
            if (!isNaN(val)) {
                currentSpeed = val;
                document.getElementById('speed-val').innerText = currentSpeed;

                if (state === 1) {
                    let now = Date.now();
                    if (lastTime > 0) {
                        let dt = (now - lastTime) / 1000;
                        totalMeters += (currentSpeed / 3.6) * dt;
                        document.getElementById('trip-val').innerText = Math.round(totalMeters);
                    }
                    lastTime = now;
                }
            }
        }
    }

    // Gestione tasto fisico
    window.onkeydown = () => {
        if (state === 0) {
            state = 1; totalMeters = 0; lastTime = Date.now();
            document.getElementById('trip-status').innerText = "MISURANDO...";
            document.getElementById('trip-box').style.background = "#111";
        } else if (state === 1) {
            state = 2;
            document.getElementById('trip-status').innerText = "RISULTATO";
